<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeLog — Daily Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">LifeLog</span>
      </div>
      <p class="auth-tagline">Track your gym, hydration &amp; study — every day.</p>

      <div id="auth-error" class="auth-error" style="display:none"></div>

      <div id="login-form">
        <input type="email" id="login-email" placeholder="Email address" class="auth-input" />
        <input type="password" id="login-password" placeholder="Password" class="auth-input" />
        <button class="btn-primary" onclick="loginUser()">Sign in</button>
        <div class="auth-divider"><span>or</span></div>
        <button class="btn-secondary" onclick="showSignup()">Create account</button>
        <button class="btn-google" onclick="loginWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
      </div>

      <div id="signup-form" style="display:none">
        <input type="text" id="signup-name" placeholder="Your name" class="auth-input" />
        <input type="email" id="signup-email" placeholder="Email address" class="auth-input" />
        <input type="password" id="signup-password" placeholder="Password (min 6 chars)" class="auth-input" />
        <button class="btn-primary" onclick="signupUser()">Create account</button>
        <div class="auth-divider"><span>or</span></div>
        <button class="btn-google" onclick="loginWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
        <button class="btn-link" onclick="showLogin()">← Back to sign in</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" style="display:none">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo-icon">◈</span>
        <span class="logo-text">LifeLog</span>
      </div>
      <div class="topbar-right">
        <span class="user-name" id="user-display"></span>
        <button class="btn-icon" onclick="logoutUser()" title="Sign out"><i class="ti ti-logout"></i></button>
      </div>
    </header>

    <main class="main-wrap">
      <!-- Week nav -->
      <div class="week-nav">
        <button class="btn-week" onclick="changeWeek(-1)"><i class="ti ti-chevron-left"></i></button>
        <div class="week-info">
          <span class="week-label" id="week-label"></span>
          <span class="week-sub" id="week-range"></span>
        </div>
        <button class="btn-week" onclick="changeWeek(1)"><i class="ti ti-chevron-right"></i></button>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="overview" onclick="switchTab('overview')"><i class="ti ti-layout-dashboard"></i><span>Overview</span></button>
        <button class="tab" data-tab="gym" onclick="switchTab('gym')"><i class="ti ti-barbell"></i><span>Gym</span></button>
        <button class="tab" data-tab="water" onclick="switchTab('water')"><i class="ti ti-droplet"></i><span>Water</span></button>
        <button class="tab" data-tab="study" onclick="switchTab('study')"><i class="ti ti-book"></i><span>Study</span></button>
      </div>

      <!-- OVERVIEW -->
      <section id="sec-overview" class="section active">
        <div class="stat-row">
          <div class="stat-card stat-gym">
            <i class="ti ti-barbell stat-icon"></i>
            <span class="stat-val" id="ov-gym">0</span>
            <span class="stat-lbl">Gym days</span>
          </div>
          <div class="stat-card stat-water">
            <i class="ti ti-droplet stat-icon"></i>
            <span class="stat-val" id="ov-water">0</span>
            <span class="stat-lbl">Avg glasses</span>
          </div>
          <div class="stat-card stat-study">
            <i class="ti ti-book stat-icon"></i>
            <span class="stat-val" id="ov-study">0h</span>
            <span class="stat-lbl">Study time</span>
          </div>
        </div>
        <div class="card">
          <div class="card-head">
            <span class="card-title"><i class="ti ti-calendar-week"></i> Week at a glance</span>
          </div>
          <div id="ov-table"></div>
        </div>
      </section>

      <!-- GYM -->
      <section id="sec-gym" class="section">
        <div class="day-grid" id="gym-days"></div>
        <div class="card">
          <div class="card-head">
            <span class="card-title gym-color"><i class="ti ti-barbell"></i> <span id="gym-day-label">Monday</span></span>
            <span class="card-date" id="gym-date-label"></span>
          </div>
          <div id="gym-content" class="loading-state"><i class="ti ti-loader-2 spin"></i> Loading…</div>
        </div>
      </section>

      <!-- WATER -->
      <section id="sec-water" class="section">
        <div class="day-grid" id="water-days"></div>
        <div class="card">
          <div class="card-head">
            <span class="card-title water-color"><i class="ti ti-droplet"></i> <span id="water-day-label">Monday</span></span>
          </div>
          <div id="water-content" class="loading-state"><i class="ti ti-loader-2 spin"></i> Loading…</div>
        </div>
      </section>

      <!-- STUDY -->
      <section id="sec-study" class="section">
        <div class="day-grid" id="study-days"></div>
        <div class="card">
          <div class="card-head">
            <span class="card-title study-color"><i class="ti ti-book"></i> <span id="study-day-label">Monday</span></span>
            <span class="card-date" id="study-date-label"></span>
          </div>
          <div id="study-content" class="loading-state"><i class="ti ti-loader-2 spin"></i> Loading…</div>
        </div>
      </section>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>
</body>
</html>
